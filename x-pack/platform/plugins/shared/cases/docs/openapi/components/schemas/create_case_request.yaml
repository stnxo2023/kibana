title: Create case request
description: >-
  The create case API request body varies depending on the type of connector.
type: object
required:
  - connector
  - description
  - owner
  - settings
  - tags
  - title
properties:
  assignees:
    $ref: 'assignees.yaml'
  connector:
    oneOf:
      - $ref: 'connector_properties_none.yaml'
      - $ref: 'connector_properties_cases_webhook.yaml'
      - $ref: 'connector_properties_jira.yaml'
      - $ref: 'connector_properties_resilient.yaml'
      - $ref: 'connector_properties_servicenow.yaml'
      - $ref: 'connector_properties_servicenow_sir.yaml'
      - $ref: 'connector_properties_swimlane.yaml'
  description:
    $ref: 'case_description.yaml'
  owner:
    $ref: 'owner.yaml'
  settings:
    $ref: 'settings.yaml'
  severity:
    $ref: 'case_severity.yaml'
  tags:
    $ref: 'case_tags.yaml'
  category:
    $ref: 'case_category.yaml'
  title:
    $ref: 'case_title.yaml'
  customFields:
    type: array
    description: >
      Custom field values for a case.
      Any optional custom fields that are not specified in the request are set to null.
    minItems: 0
    maxItems: 10
    items:
      type: object
      required:
        - key
        - type
        - value
      properties:
        $ref: 'case_customfields.yaml'
  template:
    type: object
    nullable: true
    x-state: Technical preview
    description: >
      A case template to create the case from. Requires the `xpack.cases.templates.enabled`
      setting. The server applies the template's case defaults (severity, category, tags,
      assignees, settings, connector) and its field defaults into `extended_fields`; any value
      explicitly provided in the request wins over the template default. When `version` is
      omitted, the latest version of the template is resolved and pinned on the case. To
      discover a template's fields before creating a case, use the get case fields API
      (`GET /api/cases/fields`).
    required:
      - id
    properties:
      id:
        type: string
        description: The template identifier. Retrieve template ids with `GET /api/cases/templates`.
      version:
        type: integer
        description: >
          The template version to apply. Omit to use (and pin) the latest version.
        minimum: 1
