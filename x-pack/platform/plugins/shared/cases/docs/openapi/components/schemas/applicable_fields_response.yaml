type: object
description: >
  The fields a caller may apply to a case's `extended_fields`. When no template is in scope, this is
  the owner's global (library-wide) fields; when a template is applied, it also includes that
  template's fields. Migrated legacy custom fields appear here as `global` fields, so existing
  automations can look up the exact key to write.
required:
  - fields
properties:
  fields:
    type: array
    items:
      type: object
      required:
        - key
        - name
        - label
        - type
        - control
        - required
        - requiredOnClose
        - displayOnly
        - source
        - isGlobal
      properties:
        key:
          type: string
          description: >
            The storage key to write in the case `extended_fields` map. Follows the
            `<field_name>_as_<storage_type>` convention (for example `priority_as_keyword`).
          example: priority_as_keyword
        name:
          type: string
          description: The field name as authored in the field definition.
          example: priority
        label:
          type: string
          description: The human-readable label. Falls back to `name` when no label is authored.
          example: Priority
        type:
          type: string
          description: 'The storage type: `keyword`, `integer`, `long`, `boolean`, or `date`.'
          example: keyword
        control:
          type: string
          description: >
            The UI control for the field, such as `INPUT_TEXT`, `INPUT_NUMBER`, `SELECT_BASIC`,
            `TOGGLE`, or `MARKDOWN`.
          example: SELECT_BASIC
        required:
          type: boolean
          description: Whether a value must be supplied at write time.
        requiredOnClose:
          type: boolean
          description: Whether the field must be filled before the case can be closed.
        displayOnly:
          type: boolean
          description: >
            When `true` the field is display-only (for example a `MARKDOWN` block): it is returned so
            the full form shape is visible, but it holds no value and its `key` cannot be written to
            `extended_fields`.
        options:
          type: array
          description: The allowed values for `SELECT_BASIC`, `RADIO_GROUP`, and `CHECKBOX_GROUP` fields.
          items:
            type: string
        defaultValue:
          type: string
          description: The default value, as a string, when the field definition declares one.
        source:
          type: string
          enum:
            - global
            - template
          description: >
            Where the field comes from: `global` for a library-wide (`isGlobal`) definition writable on
            any case, or `template` for a field contributed by the applied template.
        isGlobal:
          type: boolean
          description: Whether the field is a global (library-wide) definition.
