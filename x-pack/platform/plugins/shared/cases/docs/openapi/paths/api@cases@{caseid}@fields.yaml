get:
  summary: Get the fields applicable to an existing case
  operationId: getCaseApplicableFieldsDefaultSpace
  description: >
    Returns the fields a caller may write to the case's `extended_fields`. The owner and any applied
    template are derived from the case itself, so the response includes the owner's global
    (library-wide) fields and, when the case has a template applied, that template's fields.
    Requires the Cases feature to be enabled in the space.
  tags:
    - cases
  parameters:
    - $ref: '../components/parameters/case_id.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/applicable_fields_response.yaml'
          examples:
            getCaseApplicableFieldsResponse:
              $ref: '../components/examples/get_case_applicable_fields_response.yaml'
    '401':
      description: Authorization information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
          examples:
            response401:
              $ref: '../components/examples/response_401.yaml'
    '403':
      description: The user does not have access to the case.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
          examples:
            response403:
              $ref: '../components/examples/response_403.yaml'
    '404':
      description: The case was not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
          examples:
            response404:
              $ref: '../components/examples/response_404.yaml'
